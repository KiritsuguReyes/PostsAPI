# ══════════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE - Desarrollo Local
# Levanta la API + MongoDB + Redis con un solo comando
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ─── API NestJS ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: posts-api
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/postsdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-1234564789A}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - posts-network

  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: posts-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - posts-network

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: posts-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - posts-network

  # ─── Loki (almacén de logs) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: posts-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - posts-network

  # ─── Promtail (recolector de logs de Docker) ─────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: posts-promtail
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - posts-network

  # ─── Grafana (visualización) ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: posts-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - posts-network

# ─── Volúmenes persistentes ───────────────────────────────────────────────────
volumes:
  mongo-data:
  redis-data:
  loki-data:
  grafana-data:

# ─── Red interna ──────────────────────────────────────────────────────────────
networks:
  posts-network:
    driver: bridge
